<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        body{
            background:#2f3640;
            font-family:Arial;
        }

        .login-box{
            width:350px;
            background:white;
            padding:40px;
            margin:120px auto;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#273c75;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Honeypot Login</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
